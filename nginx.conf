server {
    listen 80;
    server_name guillaumechampeau.com www.guillaumechampeau.com;

    root /usr/share/nginx/html;
    index index.html;

    location = /.well-known/matrix/server {
        default_type application/json;
        add_header Access-Control-Allow-Origin "*" always;
        return 200 '{ "m.server": "matrix.guillaumechampeau.com:8448" }';
    }

    location = /.well-known/matrix/client {
        default_type application/json;
        add_header Access-Control-Allow-Origin "*" always;
        return 200 '{ "m.homeserver": { "base_url": "https://matrix.guillaumechampeau.com" }, "org.matrix.msc4143.rtc_foci": [ { "type": "livekit", "livekit_service_url": "https://matrix.guillaumechampeau.com/livekit-jwt-service" } ] }';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
