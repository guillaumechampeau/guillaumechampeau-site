worker_processes 4;

events { worker_connections 1024; }

http {
    server {
        listen 80;
        server_name guillaumechampeau.com www.guillaumechampeau.com;
        root  /usr/share/nginx/html;
        include /etc/nginx/mime.types;

location /.well-known/ {
    root /usr/share/nginx/html;
}        
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
